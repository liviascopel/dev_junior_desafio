<div style="max-width: 400px; margin: 40px auto; padding: 20px; border: 1px solid #ccc; border-radius: 8px;">
  <h2>Cadastro de Pokemon</h2>

  <form (ngSubmit)="onSubmit()">
    <div style="margin-bottom: 15px;">
      <label>Nome do Pokemon:</label>
      <input type="text" [(ngModel)]="pokemon.Name" name="name" required style="width: 100%; padding: 8px; margin-top: 5px;">
    </div>

    <div style="margin-bottom: 15px;">
      <label>Tipo:</label>
      <input type="text" [(ngModel)]="pokemon.Type" name="type" required style="width: 100%; padding: 8px; margin-top: 5px;">
    </div>

    <div style="margin-bottom: 15px;">
      <label>Nível:</label>
      <input type="text" [(ngModel)]="pokemon.Level" name="level" required style="width: 100%; padding: 8px; margin-top: 5px;">
    </div>

    <div style="margin-bottom: 15px;">
      <label>Treinador Responsável:</label>
      <select [(ngModel)]="pokemon.TrainerId" name="trainerId" required style="width: 100%; padding: 8px; margin-top: 5px;">
        <option value="" disabled selected>Selecione um treinador...</option>
        
        <option *ngFor="let t of trainersList" [value]="t.id">
          {{ t.name }}
        </option>
      </select>
    </div>

    <button type="submit" style="background-color: #0062ff; color: white; padding: 10px 15px; border: none; border-radius: 4px; cursor: pointer; width: 100%;">
      Cadastrar Pokemon
    </button>
  </form>

  <div *ngIf="message" [style.color]="isError ? 'red' : 'green'" style="margin-top: 15px; font-weight: bold; text-align: center;">
    {{ message }}
  </div>
</div>
