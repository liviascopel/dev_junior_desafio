<div style="max-width: 400px; margin: 40px auto; padding: 20px; border: 1px solid #ccc; border-radius: 8px;">
  <h2>Cadastro de Treinador</h2>

  <form (ngSubmit)="onSubmit(); formPokemon.loadTrainers()">
    <div style="margin-bottom: 15px;">
      <label>Nome do Treinador:</label>
      <input type="text" [(ngModel)]="trainer.Name" name="name" required style="width: 100%; padding: 8px; margin-top: 5px;">
    </div>

    <div style="margin-bottom: 15px;">
      <label>E-mail (Único):</label>
      <input type="email" [(ngModel)]="trainer.Email" name="email" required style="width: 100%; padding: 8px; margin-top: 5px;">
    </div>

    <div style="margin-bottom: 15px;">
      <label>Cidade de Origem:</label>
      <input type="text" [(ngModel)]="trainer.OriginCity" name="originCity" required style="width: 100%; padding: 8px; margin-top: 5px;">
    </div>

    <button type="submit" style="background-color: #ff5a00; color: white; padding: 10px 15px; border: none; border-radius: 4px; cursor: pointer; width: 100%;">
      Cadastrar Treinador
    </button>
  </form>

  <div *ngIf="message" [style.color]="isError ? 'red' : 'green'" style="margin-top: 15px; font-weight: bold; text-align: center;">
    {{ message }}
  </div>
</div>

<app-pokemon-form #formPokemon></app-pokemon-form>
